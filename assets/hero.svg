    <circle cx="760" cy="280" r="2.5" fill="#00FF88"><animate attributeName="cy" values="280;260;280" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="920" cy="120" r="2.5" fill="#7C3AED"><animate attributeName="cy" values="120;108;120" dur="3.7s" repeatCount="indefinite"/></circle>
    <circle cx="1120" cy="74" r="2.5" fill="#F8FAFC"><animate attributeName="cy" values="74;100;74" dur="4.6s" repeatCount="indefinite"/></circle>
  </g>
