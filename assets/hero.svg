  </g>

  <g>
    <rect x="1030" y="108" width="430" height="180" rx="18" fill="#0B1120" stroke="#334155" stroke-width="2" opacity="0.95"/>
    <rect x="1050" y="128" width="390" height="16" rx="8" fill="#1E293B"/>
    <rect x="1050" y="158" width="320" height="12" rx="6" fill="#1E293B"/>
    <rect x="1050" y="182" width="360" height="12" rx="6" fill="#1E293B"/>
    <rect x="1050" y="206" width="290" height="12" rx="6" fill="#1E293B"/>
    <rect x="1050" y="246" width="390" height="20" rx="10" fill="#0F172A" stroke="#1E293B"/>
    <rect x="1052" y="248" width="290" height="16" rx="8" fill="url(#g2)">
      <animate attributeName="width" values="40;330;220;390;40" dur="10s" repeatCount="indefinite"/>
    </rect>
    <text x="1060" y="150" fill="#E2E8F0" font-size="16" font-family="JetBrains Mono, Consolas, monospace">INITIALIZING PORTFOLIO...</text>
    <text x="1060" y="174" fill="#94A3B8" font-size="14" font-family="JetBrains Mono, Consolas, monospace">CONNECTING TO GITHUB APIS</text>
    <text x="1060" y="198" fill="#94A3B8" font-size="14" font-family="JetBrains Mono, Consolas, monospace">LOADING PROJECTS • METRICS • SIGNALS</text>
    <text x="1060" y="222" fill="#94A3B8" font-size="14" font-family="JetBrains Mono, Consolas, monospace">READY TO SHIP</text>
  </g>

  <g opacity="0.9">
