<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1600" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="45%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1600" y2="0">
      <stop offset="0%" stop-color="#00F7FF"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#00FF88"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="18" />
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1E293B" stroke-width="1" opacity="0.55"/>
    </pattern>
  </defs>

  <rect width="1600" height="420" rx="28" fill="url(#g1)"/>
  <rect width="1600" height="420" rx="28" fill="url(#grid)" opacity="0.55"/>
  <circle cx="260" cy="110" r="110" fill="#7C3AED" opacity="0.22" filter="url(#blur)"/>
  <circle cx="1340" cy="80" r="140" fill="#00F7FF" opacity="0.14" filter="url(#blur)"/>
  <circle cx="1270" cy="320" r="120" fill="#00FF88" opacity="0.10" filter="url(#blur)"/>

  <g opacity="0.9">
