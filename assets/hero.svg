<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" role="img" aria-label="Swapnil cyberpunk banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="45%" stop-color="#101a33"/>
      <stop offset="100%" stop-color="#090d18"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00f7ff" stop-opacity=".15"/>
      <stop offset="50%" stop-color="#7c3aed" stop-opacity=".4"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity=".15"/>
    </linearGradient>
    <linearGradient id="textgrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d9faff"/>
      <stop offset="50%" stop-color="#00f7ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 H 0 V 48" fill="none" stroke="#a5b4fc" stroke-opacity=".08" stroke-width="1"/>
    </pattern>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f7ff" stop-opacity=".28"/>
      <stop offset="65%" stop-color="#7c3aed" stop-opacity=".12"/>
      <stop offset="100%" stop-color="#0b1020" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="420" fill="url(#bg)"/>
  <rect width="1600" height="420" fill="url(#grid)"/>
  <rect width="1600" height="420" fill="url(#glow)"/>

  <circle cx="1370" cy="88" r="128" fill="url(#orb)">
    <animate attributeName="r" values="108;132;108" dur="6.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="270" cy="340" r="110" fill="url(#orb)" opacity=".8">
    <animate attributeName="cx" values="250;320;250" dur="10s" repeatCount="indefinite"/>
  </circle>

  <g filter="url(#softGlow)">
    <text x="800" y="116" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace" font-size="26" fill="#9fb4ff" letter-spacing="2">
      SWAPNIL // AI SYSTEMS ENGINEER
    </text>
    <text x="800" y="194" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="60" font-weight="800" fill="url(#textgrad)">
      BUILDING INTELLIGENT SOFTWARE
    </text>
    <text x="800" y="248" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="24" fill="#c6d7ff" opacity=".95">
      Full-Stack Developer • AI/ML Engineer • Open Source Enthusiast
    </text>
  </g>

  <g font-family="JetBrains Mono, Consolas, monospace" font-size="18" fill="#00f7ff" opacity=".9">
    <text x="800" y="310" text-anchor="middle">> Building full-stack applications</text>
    <text x="800" y="340" text-anchor="middle">> Training AI models and automation tools</text>
    <text x="800" y="370" text-anchor="middle">> Always learning something new</text>
  </g>

  <rect x="0" y="0" width="1600" height="420" fill="none" stroke="#2b365f" stroke-opacity=".9" rx="24"/>
  <rect x="80" y="62" width="1440" height="296" rx="20" fill="none" stroke="#00f7ff" stroke-opacity=".12"/>
  <rect x="0" y="0" width="1600" height="420" fill="transparent">
    <animate attributeName="opacity" values=".98;1;.98" dur="8s" repeatCount="indefinite"/>
  </rect>

  <rect x="-150" y="0" width="90" height="420" fill="#ffffff" opacity=".08" transform="skewX(-22)">
    <animate attributeName="x" values="-180;1700" dur="7.5s" repeatCount="indefinite"/>
  </rect>

  <g opacity=".18">
    <circle cx="220" cy="110" r="2" fill="#00f7ff"/>
    <circle cx="260" cy="150" r="2" fill="#7c3aed"/>
    <circle cx="300" cy="110" r="2" fill="#00ff88"/>
    <circle cx="1330" cy="300" r="2" fill="#00f7ff"/>
    <circle cx="1370" cy="260" r="2" fill="#7c3aed"/>
    <circle cx="1410" cy="300" r="2" fill="#00ff88"/>
  </g>
</svg>
