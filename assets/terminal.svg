<svg width="900" height="520" viewBox="0 0 900 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="frame" x1="0" y1="0" x2="900" y2="520">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0B1120"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="900" y2="0">
      <stop offset="0%" stop-color="#00F7FF"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#00FF88"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="4" y="4" width="892" height="512" rx="26" fill="url(#frame)" stroke="#334155" stroke-width="2"/>
  <rect x="4" y="4" width="892" height="10" rx="5" fill="url(#accent)"/>
  <circle cx="44" cy="34" r="7" fill="#EF4444"/>
  <circle cx="70" cy="34" r="7" fill="#F59E0B"/>
  <circle cx="96" cy="34" r="7" fill="#22C55E"/>

  <text x="34" y="92" fill="#C7D2FE" font-size="18" font-family="JetBrains Mono, Consolas, monospace">$ cat mission.log</text>

  <g filter="url(#glow)" font-family="JetBrains Mono, Consolas, monospace" font-size="19">
    <text x="34" y="132" fill="#F8FAFC">Mission Control</text>
    <text x="34" y="168" fill="#94A3B8">status    : online</text>
    <text x="34" y="202" fill="#94A3B8">focus     : AI + Full Stack</text>
    <text x="34" y="236" fill="#94A3B8">pipeline  : build / test / ship</text>
    <text x="34" y="270" fill="#94A3B8">runtime   : Windows + WSL2</text>
    <text x="34" y="304" fill="#94A3B8">tools     : Python, React, TensorFlow</text>
    <text x="34" y="338" fill="#94A3B8">mode      : cyber-hud</text>
    <text x="34" y="396" fill="#00FF88">✓ developer workflow optimized</text>
    <text x="34" y="432" fill="#00F7FF">✓ visual system synchronized</text>
    <text x="34" y="468" fill="#7C3AED">✓ ready for next build</text>
  </g>

  <rect x="540" y="104" width="320" height="320" rx="20" fill="#020617" stroke="#1E293B" stroke-width="2"/>
  <rect x="560" y="128" width="280" height="16" rx="8" fill="#1E293B"/>
  <rect x="560" y="160" width="230" height="12" rx="6" fill="#1E293B"/>
  <rect x="560" y="184" width="260" height="12" rx="6" fill="#1E293B"/>
  <rect x="560" y="208" width="210" height="12" rx="6" fill="#1E293B"/>
  <rect x="560" y="248" width="280" height="18" rx="9" fill="#0F172A" stroke="#1E293B"/>
  <rect x="562" y="250" width="214" height="14" rx="7" fill="url(#accent)">
    <animate attributeName="width" values="70;220;120;280;70" dur="9s" repeatCount="indefinite"/>
  </rect>
  <rect x="560" y="286" width="280" height="18" rx="9" fill="#0F172A" stroke="#1E293B"/>
  <rect x="562" y="288" width="176" height="14" rx="7" fill="#00FF88">
    <animate attributeName="width" values="40;190;150;260;40" dur="7s" repeatCount="indefinite"/>
  </rect>
  <rect x="560" y="324" width="280" height="18" rx="9" fill="#0F172A" stroke="#1E293B"/>
  <rect x="562" y="326" width="236" height="14" rx="7" fill="#00F7FF">
    <animate attributeName="width" values="80;240;180;280;80" dur="8s" repeatCount="indefinite"/>
  </rect>
  <text x="560" y="388" fill="#94A3B8" font-size="13" font-family="JetBrains Mono, Consolas, monospace">loading custom SVG assets...</text>
  <text x="560" y="414" fill="#94A3B8" font-size="13" font-family="JetBrains Mono, Consolas, monospace">synchronizing readme modules...</text>
</svg>