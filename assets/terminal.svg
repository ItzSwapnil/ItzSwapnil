<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" role="img" aria-label="Terminal summary card">
  <defs>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00f7ff"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#00ff88"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="10" y="10" width="880" height="400" rx="26" fill="url(#frame)" stroke="#334155" stroke-width="2"/>
  <rect x="10" y="10" width="880" height="56" rx="26" fill="#0b1220" opacity=".95"/>
  <circle cx="44" cy="38" r="7" fill="#ff5f56"/>
  <circle cx="72" cy="38" r="7" fill="#ffbd2e"/>
  <circle cx="100" cy="38" r="7" fill="#27c93f"/>
  <text x="450" y="41" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace" font-size="18" fill="#cbd5e1">swapnil@WSL:~$</text>

  <rect x="30" y="86" width="840" height="292" rx="18" fill="#050816" stroke="#1f2937"/>
  <text x="56" y="126" font-family="JetBrains Mono, Consolas, monospace" font-size="18" fill="#00f7ff">whoami</text>
  <text x="56" y="160" font-family="JetBrains Mono, Consolas, monospace" font-size="18" fill="#cbd5e1">Swapnil</text>
  <text x="56" y="204" font-family="JetBrains Mono, Consolas, monospace" font-size="18" fill="#00f7ff">pwd</text>
  <text x="56" y="238" font-family="JetBrains Mono, Consolas, monospace" font-size="18" fill="#cbd5e1">/home/swapnil/ai-systems</text>
  <text x="56" y="282" font-family="JetBrains Mono, Consolas, monospace" font-size="18" fill="#00f7ff">ls</text>
  <text x="56" y="316" font-family="JetBrains Mono, Consolas, monospace" font-size="18" fill="#cbd5e1">NEXUS  DART  Leaf_Disease_Detection  tools  workflows</text>
  <text x="56" y="360" font-family="JetBrains Mono, Consolas, monospace" font-size="18" fill="#00f7ff">status</text>
  <text x="150" y="360" font-family="JetBrains Mono, Consolas, monospace" font-size="18" fill="#cbd5e1">shipping</text>

  <rect x="150" y="348" width="112" height="18" rx="9" fill="url(#accent)" opacity=".9" filter="url(#glow)">
    <animate attributeName="width" values="112;206;112" dur="3.8s" repeatCount="indefinite"/>
  </rect>
  <rect x="150" y="348" width="206" height="18" rx="9" fill="none" stroke="#24314f" opacity=".8"/>
  <rect x="356" y="348" width="10" height="18" fill="#e2e8f0">
    <animate attributeName="opacity" values="1;0;1" dur="0.9s" repeatCount="indefinite"/>
  </rect>
</svg>
